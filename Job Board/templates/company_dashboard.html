<!DOCTYPE html>
<html>
<head>
    <title>Company Dashboard</title>
</head>
<body>
    <h1>Welcome {{ name }} (Company)</h1>

    <a href="{{ url_for('post_job') }}">
        <button>Post a Job</button>
    </a>
    <a href="{{ url_for('logout') }}">
        <button>Logout</button>
    </a>

    <h2>Your Posted Jobs</h2>
    <table border="1">
        <tr>
            <th>Job Title</th>
            <th>Description</th>
            <th>Salary</th>
            <th>Work Mode</th>
            <th>Status</th>
        </tr>
        {% for job in jobs %}
        <tr>
            <td>{{ job.title }}</td>
            <td>{{ job.description }}</td>
            <td>{{ job.salary }}</td>
            <td>{{ job.work_mode }}</td>
            <td>{{ job.status }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
