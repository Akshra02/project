<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
    }

    .container {
      width: 100%;
      max-width: 600px;
      margin: 60px auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0px 4px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      display: block;
      margin: 10px 0 5px;
      color: #333;
    }

    input[type="text"],
    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      height: 100px;
    }

    button {
      width: 100%;
      background: #27ae60;
      color: #fff;
      font-size: 16px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background: #219150;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 15px;
      color: #27ae60;
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Apply with Resume</h2>
    <form method="POST">
      <label>Education:</label>
      <input type="text" name="education" required>

      <label>Experience:</label>
      <textarea name="experience" required></textarea>

      <label>Skills:</label>
      <input type="text" name="skills" required>

      <label>Languages Known:</label>
      <input type="text" name="languages" required>

      <label>Certifications / Achievements:</label>
      <textarea name="certifications"></textarea>

      <button type="submit">Submit Application</button>
    </form>
    <a href="{{ url_for('dashboard') }}" class="back-link">⬅ Back to Dashboard</a>
  </div>
</body>
</html>
